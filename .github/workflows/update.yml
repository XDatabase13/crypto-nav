name: Update mNAV Data

# sbg-nav と同一のcronスケジュール（JST 05:30〜07:30 の5本）
# GitHub Actions の cron は UTC。JST = UTC+9。
on:
  workflow_dispatch:

concurrency:
  group: update-mnav-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build_data.py
        run: python build_data.py

      - name: Commit and push if data.json changed
        # skip-commit ロジック: data.json に実質的な差分がなければコミットしない
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json に変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            git commit -m "auto: update mNAV data ${TIMESTAMP}"
            git pull --rebase origin master
            git push
            echo "data.json をコミット・プッシュしました。"
          fi
